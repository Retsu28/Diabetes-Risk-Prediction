{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm text-dark bg-white">
            <div class="card-header bg-warning py-3">
                <h5 class="mb-0 fw-bold">Edit Patient: {{ patient.name }}</h5>
            </div>
            <div class="card-body p-4">
                <!-- FORM START -->
                <form action="{{ url_for('edit_patient', id=patient.id) }}" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Full Name</label>
                        <input type="text" name="name" class="form-control" value="{{ patient.name }}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Age</label>
                            <input type="number" name="age" class="form-control" value="{{ patient.age }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                                <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                                <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Contact Info</label>
                        <input type="text" name="contact" class="form-control" value="{{ patient.contact }}" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning py-2">Update Changes</button>
                        <a href="{{ url_for('list_patients') }}" class="btn btn-light py-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
