{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0 fw-bold">Register New Patient</h5>
            </div>
            <div class="card-body p-4">
                <!-- FORM START -->
                <form action="{{ url_for('add_patient') }}" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter patient name" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Age</label>
                            <input type="number" name="age" class="form-control" placeholder="Years" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Contact Info</label>
                        <input type="text" name="contact" class="form-control" placeholder="Phone or Email" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary py-2">Save Record</button>
                        <a href="{{ url_for('list_patients') }}" class="btn btn-light py-2">Cancel</a>
                    </div>
                    
                </form>
                <!-- FORM END -->
            </div>
        </div>
    </div>
</div>
{% endblock %}
