<!-- ============================================================
     FILE: 404.html  —  Custom "Not Found" Error Page
     ============================================================ -->
{% extends 'base.html' %}

{% block page_title %}Page Not Found{% endblock %}

{% block content %}
<div class="row justify-content-center animate-in" style="min-height:60vh; align-items:center;">
    <div class="col-lg-5 col-md-7">
        <div class="card text-center" style="overflow:hidden;">
            <!-- Blue gradient header strip -->
            <div class="p-5" style="background: linear-gradient(135deg, #05204a, #0d6efd);">
                <div style="width:88px; height:88px; border-radius:50%; background:rgba(255,255,255,.12); display:inline-flex; align-items:center; justify-content:center; margin-bottom:16px; backdrop-filter:blur(6px);">
                    <i class="bi bi-signpost-split-fill text-white" style="font-size:2.4rem;"></i>
                </div>
                <h1 class="display-1 fw-bold text-white mb-0" style="letter-spacing:-3px;">404</h1>
            </div>

            <div class="card-body p-4 p-lg-5">
                <h4 class="heading-serif fw-bold mb-2" style="color:#1e293b;">Page Not Found</h4>
                <p class="text-muted mb-4" style="font-size:.92rem; max-width:340px; margin:0 auto;">
                    The page you're looking for doesn't exist. It may have been moved or removed.
                </p>
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary d-inline-flex align-items-center gap-2" id="btn-404-home">
                    <i class="bi bi-house-fill"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
